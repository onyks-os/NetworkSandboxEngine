name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'gui/gui_svelte/package-lock.json'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nftables iproute2 conntrack

    - name: Bootstrap Environment
      run: |
        make setup

    - name: Run Static Analysis Lints (Ruff)
      run: |
        make lint

    - name: Run Python Unit Tests
      run: |
        make test

    - name: Run Svelte Frontend Build
      run: |
        make build-frontend

    - name: Run Headless CLI Integration Tests (netns + nftables)
      run: |
        sudo .venv/bin/python -m nse.cli.runner --file tests/test_suite.yaml
